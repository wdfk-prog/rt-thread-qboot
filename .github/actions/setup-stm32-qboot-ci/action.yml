name: Setup STM32 QBoot CI
description: Restore Python/SCons dependencies and a cached ARM GCC toolchain for STM32 BSP builds.

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: pip
        cache-dependency-path: .github/ci/qboot/requirements-stm32.txt

    - name: Install host build utilities
      shell: bash
      run: |
        set -euo pipefail
        export DEBIAN_FRONTEND=noninteractive
        sudo apt-get update -qq \
          -o Acquire::Retries=5 \
          -o Acquire::http::Timeout=30 \
          -o Acquire::https::Timeout=30
        timeout 20m sudo apt-get install -y --no-install-recommends \
          -o Acquire::Retries=5 \
          -o Acquire::http::Timeout=30 \
          -o Acquire::https::Timeout=30 \
          bzip2 \
          ca-certificates \
          git \
          python3 \
          rsync \
          wget

    - name: Install Python build dependencies
      shell: bash
      run: |
        set -euo pipefail
        python -m pip install --user -r .github/ci/qboot/requirements-stm32.txt
        python -c 'import requests; print("requests version:", requests.__version__)'
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"
        "$HOME/.local/bin/scons" --version

    - name: Restore ARM GCC cache
      id: cache-arm-gcc
      uses: actions/cache@v4
      with:
        path: _ci/toolchains/gcc-arm-none-eabi
        key: ${{ runner.os }}-gcc-arm-none-eabi-10.3-2021.10-v1

    - name: Install ARM GCC on cache miss
      if: steps.cache-arm-gcc.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -euo pipefail
        archive="gcc-arm-none-eabi-10.3-2021.10-x86_64-linux.tar.bz2"
        archive_sha256="97dbb4f019ad1650b732faffcc881689cedc14e2b7ee863d390e0a41ef16c9a3"
        url="https://developer.arm.com/-/media/Files/downloads/gnu-rm/10.3-2021.10/$archive"
        toolchain_dir="$GITHUB_WORKSPACE/_ci/toolchains/gcc-arm-none-eabi"
        download_dir="$GITHUB_WORKSPACE/_ci/downloads"

        rm -rf "$toolchain_dir"
        mkdir -p "$toolchain_dir" "$download_dir"
        for attempt in 1 2 3; do
          if wget --timeout=60 --tries=1 -O "$download_dir/$archive" "$url"; then
            break
          fi
          if [ "$attempt" -eq 3 ]; then
            echo "failed to download ARM GCC after $attempt attempts" >&2
            exit 1
          fi
          sleep $((attempt * 5))
        done
        printf '%s  %s\n' "$archive_sha256" "$download_dir/$archive" | sha256sum -c -
        tar -xjf "$download_dir/$archive" --strip-components=1 -C "$toolchain_dir"
        test -x "$toolchain_dir/bin/arm-none-eabi-gcc"

    - name: Export ARM GCC environment
      shell: bash
      run: |
        set -euo pipefail
        toolchain_dir="$GITHUB_WORKSPACE/_ci/toolchains/gcc-arm-none-eabi"
        test -x "$toolchain_dir/bin/arm-none-eabi-gcc"
        echo "$toolchain_dir/bin" >> "$GITHUB_PATH"
        echo "RTT_CC=gcc" >> "$GITHUB_ENV"
        echo "RTT_EXEC_PATH=$toolchain_dir/bin" >> "$GITHUB_ENV"
        echo "QBOOT_STM32_RTT_EXEC_PATH=$toolchain_dir/bin" >> "$GITHUB_ENV"
        "$toolchain_dir/bin/arm-none-eabi-gcc" --version
