name: Build and Deploy Doxygen to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install Doxygen and Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz

      - name: Prepare output directory
        run: mkdir -p build/doxygen

      - name: Build Doxygen site
        run: |
          doxygen Doxyfile
          touch build/doxygen/html/.nojekyll

      - name: Add package tool web page
        run: |
          set -euo pipefail
          mkdir -p build/doxygen/html/package-tool
          cp -a docs/package-tool/. build/doxygen/html/package-tool/
          test -f build/doxygen/html/package-tool/index.html
          test -f build/doxygen/html/package-tool/app.js
          test -f build/doxygen/html/package-tool/package_tool_web.py
          grep -q 'data-lang="zh-CN"' build/doxygen/html/package-tool/index.html
          grep -q 'data-lang="en"' build/doxygen/html/package-tool/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: build/doxygen/html

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
