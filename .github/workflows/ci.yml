name: CI

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  RTTHREAD_REF: master
  RTTHREAD_ENV_REF: master
  STM32_BSP: bsp/stm32/stm32f407-atk-explorer
  CRCLIB_REF: master
  TINYCRYPT_REF: master
  ZLIB_REF: master
  QUICKLZ_REF: master
  FASTLZ_REF: master
  QLED_REF: master

jobs:
  package-check:
    name: Package metadata and script checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check required package files
        shell: bash
        run: |
          set -euo pipefail
          test -f Kconfig
          test -f SConscript
          test -d inc
          test -d src
          test -d algorithm
          test -d platform
          test -f .github/ci/qboot/profile-list.txt
          test -d .github/ci/qboot/profiles
          test -f .github/ci/qboot/prepare-stm32f407-base.sh
          test -f .github/ci/qboot/build-stm32f407-profile.sh
          test -f .github/ci/qboot/build-stm32f407-profiles.sh
          test -f tools/package_tool.py
          test -f tests/test_package_tool.py

      - name: Check SConscript syntax
        shell: bash
        run: python3 -S -m py_compile SConscript

      - name: Check CI helper syntax
        shell: bash
        run: |
          set -euo pipefail
          for script in .github/ci/qboot/*.sh; do
            bash -n "$script"
          done

      - name: Check package tool syntax
        shell: bash
        run: python3 -S -m py_compile tools/package_tool.py tests/test_package_tool.py

      - name: Test package tool matrix
        shell: bash
        run: python3 -S tests/test_package_tool.py

      - name: Upload package tool test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: package-tool-test-artifacts
          path: _ci/package-tool-test
          if-no-files-found: error

      - name: Check profile fragments
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r profile; do
            case "$profile" in
              ''|'#'*) continue ;;
            esac
            test -f ".github/ci/qboot/profiles/$profile.h"
          done < .github/ci/qboot/profile-list.txt

      - name: Check Kconfig block balance
        shell: bash
        run: |
          python3 -S - <<'PY'
          from pathlib import Path

          stack = []
          pairs = {
              'if': 'endif',
              'menu': 'endmenu',
              'choice': 'endchoice',
          }
          closers = {value: key for key, value in pairs.items()}

          for lineno, raw in enumerate(Path('Kconfig').read_text(encoding='utf-8').splitlines(), 1):
              line = raw.strip()
              if not line or line.startswith('#'):
                  continue
              keyword = line.split()[0]
              if keyword in pairs:
                  stack.append((keyword, lineno))
              elif keyword in closers:
                  if not stack:
                      raise SystemExit(f'Kconfig:{lineno}: unmatched {keyword}')
                  opener, opener_lineno = stack.pop()
                  if opener != closers[keyword]:
                      raise SystemExit(
                          f'Kconfig:{lineno}: {keyword} closes {opener} from line {opener_lineno}'
                      )

          if stack:
              opener, opener_lineno = stack[-1]
              raise SystemExit(f'Kconfig:{opener_lineno}: unclosed {opener}')
          PY

  cppcheck-report:
    name: Static analysis with cppcheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install cppcheck
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck

      - name: Run cppcheck
        shell: bash
        run: |
          set +e
          cppcheck \
            --enable=warning,style,performance,portability \
            --inconclusive \
            --std=c11 \
            --force \
            --quiet \
            --suppress=missingInclude \
            --suppress=missingIncludeSystem \
            -Iinc \
            -Ialgorithm \
            -Iplatform \
            src algorithm platform \
            2> >(tee cppcheck.txt >&2)
          status=$?
          test -f cppcheck.txt || touch cppcheck.txt
          exit "$status"

      - name: Upload cppcheck report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cppcheck-report
          path: cppcheck.txt
          if-no-files-found: error

  build-stm32f407:
    name: Build STM32F407 qboot profiles
    runs-on: ubuntu-latest
    needs:
      - package-check

    steps:
      - name: Checkout qboot package
        uses: actions/checkout@v5

      - name: Install build dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-arm-none-eabi \
            binutils-arm-none-eabi \
            libnewlib-arm-none-eabi \
            git \
            python3 \
            python3-pip \
            rsync \
            scons
          arm-none-eabi-gcc --version
          scons --version

      - name: Prepare shared RT-Thread STM32F407 BSP
        shell: bash
        run: |
          set -o pipefail
          mkdir -p _ci/profile-logs
          bash .github/ci/qboot/prepare-stm32f407-base.sh 2>&1 | tee _ci/profile-logs/prepare-stm32f407-base.log

      - name: Build qboot profiles
        shell: bash
        run: bash .github/ci/qboot/build-stm32f407-profiles.sh

      - name: Upload STM32F407 build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stm32f407-build-logs
          path: _ci/profile-logs/*.log
          if-no-files-found: warn
